<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatrice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark" id="background">
    <div id="container-mode">
        <div id="mode" class="dark">Dark</div>
    </div>
    <div id="container-calcolatrice">
        <div id="container-risultato">
            <input type="text" id="risultato" placeholder="0" readonly>
        </div>
        <div id="container-tasti">
            <div class="button operazione" id="cos">cos(x)</div>
            <div class="button operazione" id="sin">sin(x)</div>
            <div class="button operazione" id="tan">tan(x)</div>
            <div class="button operazione" id="cot">cot(x)</div>
            <div class="button operazione" id="sec">sec(x)</div>

            <div class="button" id="AC">AC</div>
            <div class="button" id="pi">π</div>
            <div class="button" id="e">e</div>
            <div class="button" id="C"><</div>
            <div class="button operazione segno" id="/">/</div>

            <div class="button operazione" id="potenza">x^y</div>
            <div class="button number" id="9">9</div>
            <div class="button number" id="8">8</div>
            <div class="button number" id="7">7</div>
            <div class="button operazione segno" id="*">*</div>

            <div class="button operazione" id="potenza^2">x^2</div>
            <div class="button number" id="6">6</div>
            <div class="button number" id="5">5</div>
            <div class="button number" id="4">4</div>
            <div class="button operazione segno" id="-">-</div>

            <div class="button operazione" id="sqrt">sqrt(x)</div>
            <div class="button number" id="3">3</div>
            <div class="button number" id="2">2</div>
            <div class="button number" id="1">1</div>
            <div class="button operazione segno" id="+">+</div>

            <div class="button operazione" id="log">log(x)</div>
            <div class="button operazione" id="negate">+/-</div>
            <div class="button number" id="0">0</div>
            <div class="button operazione" id=",">,</div>
            <div class="button operazione segno" id="=">=</div>
        </div>
    </div>
    <script src="calcolatrice.js"></script>
</body>
</html>
